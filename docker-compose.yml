name: pos-fiscal

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: pos-fiscal-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [pos]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [pos]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pos_fiscal}
      POSTGRES_USER: ${DB_USERNAME:-pos_fiscal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_fiscal_local_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pos_fiscal} -d ${DB_DATABASE:-pos_fiscal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [pos]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [pos]

networks:
  pos:
    driver: bridge

volumes:
  pgdata:
  redisdata:
